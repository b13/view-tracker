<html
	xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
	data-namespace-typo3-fluid="true"
>

<div>
	<strong><f:translate key="LLL:EXT:view_tracker/Resources/Private/Language/locallang_be.xlf:pageModule.header" /></strong>
	<br />

	<f:for each="{dataSets}" as="set" iteration="i">
			<button
				type="button"
				class="bJS_txViewTrackerDataSet btn btn-link btn-sm"
				data-title="{set.label}"
				data-views="{set.data -> f:format.json()}"
				data-type="{set.type}"
				data-options='{"barOptions": {"stacked": 1}}'
			>{set.label}</button>

	</f:for>

	<div id='bJS_txViewTrackerChart'></div>
</div>

</html>
